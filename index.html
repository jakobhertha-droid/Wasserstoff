<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasserstoff - Premium Simulation</title>
<style>
  :root {
    --bg-main: #050b14;
    --glass-bg: rgba(20, 30, 48, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --green-glow: #00ff88;
    --blue-glow: #00d2ff;
    --gray-glow: #ff5e62;
    --text-light: #e2e8f0;
    --text-muted: #94a3b8;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg-main);
    background-image: radial-gradient(circle at 50% 0%, #112240 0%, #050b14 70%);
    color: var(--text-light);
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    box-sizing: border-box;
  }

  .container {
    max-width: 800px;
    width: 100%;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  h2 {
    text-align: center;
    margin: 0 0 5px 0;
    font-size: 28px;
    background: linear-gradient(to right, #fff, #a5b4fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p.subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 30px;
  }

  /* BUTTONS / TABS */
  .tabs {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
  }

  .tab {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border);
    color: var(--text-muted);
    padding: 16px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .tab::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: all 0.5s;
  }

  .tab:hover::before { left: 100%; }
  .tab:hover { color: white; transform: translateY(-2px); }

  .tab.active-green { 
    background: rgba(0, 255, 136, 0.1); 
    border-color: var(--green-glow); 
    color: #fff;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.2), inset 0 0 10px rgba(0, 255, 136, 0.1);
  }
  .tab.active-blue { 
    background: rgba(0, 210, 255, 0.1); 
    border-color: var(--blue-glow); 
    color: #fff;
    box-shadow: 0 0 20px rgba(0, 210, 255, 0.2), inset 0 0 10px rgba(0, 210, 255, 0.1);
  }
  .tab.active-gray { 
    background: rgba(255, 94, 98, 0.1); 
    border-color: var(--gray-glow); 
    color: #fff;
    box-shadow: 0 0 20px rgba(255, 94, 98, 0.2), inset 0 0 10px rgba(255, 94, 98, 0.1);
  }

  /* STAGE & ANIMATIONS */
  .stage {
    position: relative;
    height: 380px;
    background: #020617;
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    overflow: hidden;
    margin-bottom: 25px;
    box-shadow: inset 0 10px 30px rgba(0,0,0,0.8);
  }

  /* Erdschicht (Untergrund) */
  .earth-layer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 80px;
    background: repeating-linear-gradient(
      45deg,
      #0f172a,
      #0f172a 10px,
      #1e293b 10px,
      #1e293b 20px
    );
    border-top: 2px solid #334155;
    z-index: 1;
    opacity: 0.5;
  }

  /* Energiequelle */
  .source {
    position: absolute;
    left: 50px;
    bottom: 80px;
    width: 90px;
    height: 140px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    z-index: 3;
  }

  /* Fabrik */
  .factory {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 80px;
    width: 140px;
    height: 110px;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-radius: 12px 12px 0 0;
    border: 1px solid #475569;
    border-bottom: none;
    z-index: 4;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
  }
  
  .reactor-core {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #020617;
    border: 2px solid #334155;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .core-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.5s, background 0.5s;
    animation: pulse 2s infinite alternate;
  }
  @keyframes pulse { 0% { transform: scale(0.8); } 100% { transform: scale(1.2); } }

  .chimney {
    position: absolute;
    top: -50px;
    right: 20px;
    width: 24px;
    height: 50px;
    background: linear-gradient(to right, #334155, #1e293b);
    border: 1px solid #475569;
    border-bottom: none;
  }

  /* H2 Tank */
  .tank {
    position: absolute;
    right: 50px;
    bottom: 80px;
    width: 70px;
    height: 140px;
    background: rgba(255,255,255,0.05);
    border-radius: 35px;
    border: 2px solid #cbd5e1;
    z-index: 3;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-weight: 900;
    font-size: 24px;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.1), 0 0 15px rgba(255,255,255,0.05);
    overflow: hidden;
  }
  
  .tank-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, rgba(255,255,255,0.3), transparent);
    transition: height 1s ease-out;
  }

  /* H2 Bubbles in Tank */
  .bubble {
    position: absolute;
    bottom: -10px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: rise infinite ease-in;
    opacity: 0;
  }
  @keyframes rise {
    0% { bottom: -10px; transform: translateX(0); opacity: 0; }
    20% { opacity: 1; }
    100% { bottom: 100%; transform: translateX(-10px); opacity: 0; }
  }

  /* Rohre & Energiefluss */
  .pipe {
    position: absolute;
    height: 14px;
    background: #1e293b;
    border: 1px solid #334155;
    bottom: 100px;
    z-index: 2;
    border-radius: 7px;
    overflow: hidden;
  }
  .pipe-in { left: 100px; width: calc(50% - 170px); }
  .pipe-out { right: 100px; width: calc(50% - 170px); }
  
  .pipe-down {
    position: absolute;
    width: 16px;
    height: 0px;
    background: #1e293b;
    border-left: 1px solid #334155;
    border-right: 1px solid #334155;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0; /* Geht in die Erde */
    z-index: 2;
    transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
  }

  .flow {
    width: 100%;
    height: 100%;
    background-image: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.9) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: flowAnim 1s infinite linear;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .flow-down {
    background-image: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.9) 50%, transparent 100%);
    background-size: 100% 200%;
    animation: flowAnimVert 1s infinite linear;
  }

  @keyframes flowAnim { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  @keyframes flowAnimVert { 0% { background-position: 0 -100%; } 100% { background-position: 0 100%; } }

  /* SVGs */
  .svg-wind { display: none; width: 90px; height: 140px; }
  .svg-gas { display: none; width: 70px; height: 90px; }
  
  .spin { transform-origin: 45px 35px; animation: spinAnim 2.5s infinite linear; }
  @keyframes spinAnim { 100% { transform: rotate(360deg); } }

  /* Rauch / CO2 */
  .smoke-container {
    position: absolute;
    top: -120px;
    right: -10px;
    width: 60px;
    height: 120px;
    display: none;
  }
  .smoke {
    position: absolute;
    bottom: 0;
    width: 35px;
    height: 35px;
    background: radial-gradient(circle, #94a3b8 0%, #475569 100%);
    border-radius: 50%;
    opacity: 0;
    filter: blur(4px);
    animation: smokeAnim 2s infinite ease-out;
  }
  .smoke:nth-child(2) { animation-delay: 0.6s; left: 15px; }
  .smoke:nth-child(3) { animation-delay: 1.2s; left: -10px; }

  @keyframes smokeAnim {
    0% { transform: translateY(0) scale(0.8); opacity: 0.9; }
    100% { transform: translateY(-100px) scale(3); opacity: 0; }
  }

  /* CO2 Speicher Unten */
  .co2-storage {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 35px;
    background: rgba(0, 210, 255, 0.1);
    border: 2px dashed #00d2ff;
    border-radius: 8px;
    color: #00d2ff;
    font-size: 13px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 3;
    box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2);
  }

  /* Info Panel & CO2 Meter */
  .info-panel {
    display: flex;
    gap: 20px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--glass-border);
    padding: 24px;
    border-radius: 16px;
    align-items: center;
  }

  .info-content { flex: 2; }
  .info-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; transition: color 0.3s; }
  .info-text { font-size: 15px; line-height: 1.6; color: var(--text-light); }

  .co2-meter {
    flex: 1;
    background: #0f172a;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #334155;
    text-align: center;
  }
  .meter-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .meter-bar-bg { width: 100%; height: 12px; background: #1e293b; border-radius: 6px; overflow: hidden; position: relative; }
  .meter-bar-fill { height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.8s; }
  .meter-value { font-size: 24px; font-weight: bold; margin-top: 8px; font-variant-numeric: tabular-nums; }

  @media (max-width: 600px) {
    .info-panel { flex-direction: column; }
    .tabs { flex-direction: column; gap: 10px; }
    .stage { height: 300px; }
    .source { left: 20px; transform: scale(0.8); bottom: 90px; }
    .tank { right: 20px; transform: scale(0.8); bottom: 90px; }
    .factory { transform: translateX(-50%) scale(0.8); bottom: 90px; }
    .pipe-in { left: 60px; width: calc(50% - 100px); }
    .pipe-out { right: 60px; width: calc(50% - 100px); }
  }
</style>
</head>
<body>

<div class="container">
  <h2>Wasserstoff-Produktion</h2>
  <p class="subtitle">Interaktives Datenmodell: Kreislauf und Emissionen</p>

  <div class="tabs">
    <div class="tab" id="tab-green" onclick="setMode('green')">🟢 Grüner H₂</div>
    <div class="tab" id="tab-blue" onclick="setMode('blue')">🔵 Blauer H₂</div>
    <div class="tab" id="tab-gray" onclick="setMode('gray')">🟤 Grauer H₂</div>
  </div>

  <div class="stage">
    <div class="earth-layer"></div>
    <div class="co2-storage" id="storage">CO₂ Endlager</div>

    <div class="source">
      <svg class="svg-wind" id="svg-wind" viewBox="0 0 90 140">
        <defs>
          <linearGradient id="windGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff"/>
            <stop offset="100%" stop-color="#94a3b8"/>
          </linearGradient>
        </defs>
        <rect x="42" y="35" width="6" height="100" fill="url(#windGrad)" rx="3"/>
        <g class="spin">
          <circle cx="45" cy="35" r="7" fill="#00ff88" filter="drop-shadow(0 0 5px #00ff88)"/>
          <path d="M45 35 L45 0 A10 10 0 0 1 52 5 Z" fill="url(#windGrad)"/>
          <path d="M45 35 L16 52 A10 10 0 0 1 22 45 Z" fill="url(#windGrad)"/>
          <path d="M45 35 L74 52 A10 10 0 0 0 68 45 Z" fill="url(#windGrad)"/>
        </g>
      </svg>
      <svg class="svg-gas" id="svg-gas" viewBox="0 0 70 90">
        <rect x="10" y="50" width="50" height="40" fill="#334155" rx="4" stroke="#475569" stroke-width="2"/>
        <path d="M25 50 L25 25 L45 25 L45 50" fill="none" stroke="#64748b" stroke-width="6"/>
        <circle cx="35" cy="25" r="10" fill="#ff5e62"/>
        <path d="M35 12 Q 42 5 35 0 Q 28 5 35 12" fill="#ff9966" filter="drop-shadow(0 0 8px #ff5e62)"/>
      </svg>
    </div>

    <div class="pipe pipe-in"><div class="flow" id="flow-in"></div></div>
    <div class="pipe pipe-out"><div class="flow" id="flow-out"></div></div>
    <div class="pipe-down" id="pipe-down"><div class="flow flow-down" id="flow-down"></div></div>

    <div class="factory">
      <div class="chimney">
        <div class="smoke-container" id="smoke">
          <div class="smoke"></div><div class="smoke"></div><div class="smoke"></div>
        </div>
      </div>
      <div class="reactor-core">
        <div class="core-glow" id="core-glow"></div>
      </div>
    </div>

    <div class="tank">
      H₂
      <div class="tank-fill" id="tank-fill"></div>
      </div>
  </div>

  <div class="info-panel">
    <div class="info-content">
      <div class="info-title" id="info-title">System im Ruhezustand</div>
      <div class="info-text" id="info-text">Wähle oben eine Produktionsmethode, um die Anlage hochzufahren und die Emissionswerte zu analysieren.</div>
    </div>
    <div class="co2-meter">
      <div class="meter-label">CO₂ Emissionen</div>
      <div class="meter-bar-bg">
        <div class="meter-bar-fill" id="meter-fill"></div>
      </div>
      <div class="meter-value" id="meter-value">--</div>
    </div>
  </div>
</div>

<script>
  // Erzeuge H2 Bläschen im Tank
  const tank = document.querySelector('.tank');
  for(let i=0; i<8; i++) {
    let b = document.createElement('div');
    b.className = 'bubble';
    b.style.width = Math.random() * 8 + 4 + 'px';
    b.style.height = b.style.width;
    b.style.left = Math.random() * 80 + 10 + '%';
    b.style.animationDuration = Math.random() * 1.5 + 1.5 + 's';
    b.style.animationDelay = Math.random() * 2 + 's';
    tank.appendChild(b);
  }

  function setMode(type) {
    // Reset Tabs
    document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
    
    // DOM Elements
    const flowIn = document.getElementById('flow-in');
    const flowOut = document.getElementById('flow-out');
    const svgWind = document.getElementById('svg-wind');
    const svgGas = document.getElementById('svg-gas');
    const smoke = document.getElementById('smoke');
    const pipeDown = document.getElementById('pipe-down');
    const flowDown = document.getElementById('flow-down');
    const storage = document.getElementById('storage');
    const coreGlow = document.getElementById('core-glow');
    const tankFill = document.getElementById('tank-fill');
    
    const infoTitle = document.getElementById('info-title');
    const infoText = document.getElementById('info-text');
    const meterFill = document.getElementById('meter-fill');
    const meterValue = document.getElementById('meter-value');

    // Base Reset
    flowIn.style.opacity = '1';
    flowOut.style.opacity = '1';
    pipeDown.style.height = '0px';
    storage.style.opacity = '0';
    flowDown.style.opacity = '0';
    tankFill.style.height = '60%';

    // H2 Flow out ist immer hellblau/weiß
    flowOut.style.backgroundImage = 'linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.9) 50%, transparent 100%)';

    if (type === 'green') {
      document.getElementById('tab-green').classList.add('active-green');
      svgWind.style.display = 'block';
      svgGas.style.display = 'none';
      smoke.style.display = 'none';
      
      flowIn.style.backgroundImage = 'linear-gradient(90deg, transparent 0%, var(--green-glow) 50%, transparent 100%)';
      coreGlow.style.opacity = '1';
      coreGlow.style.background = 'radial-gradient(circle, var(--green-glow) 0%, transparent 70%)';
      
      infoTitle.textContent = 'Grüner Wasserstoff';
      infoTitle.style.color = 'var(--green-glow)';
      infoText.innerHTML = 'Wind und Sonne liefern die Energie, um Wasser per Elektrolyse zu spalten. <strong>Absolut klimaneutral.</strong> Es entsteht nur reiner Wasserstoff und Sauerstoff.';
      
      meterFill.style.width = '0%';
      meterFill.style.background = 'var(--green-glow)';
      animateValue(meterValue, 0, '0 kg');
    } 
    else if (type === 'blue') {
      document.getElementById('tab-blue').classList.add('active-blue');
      svgWind.style.display = 'none';
      svgGas.style.display = 'block';
      smoke.style.display = 'none';
      
      flowIn.style.backgroundImage = 'linear-gradient(90deg, transparent 0%, var(--blue-glow) 50%, transparent 100%)';
      coreGlow.style.opacity = '1';
      coreGlow.style.background = 'radial-gradient(circle, var(--blue-glow) 0%, transparent 70%)';

      setTimeout(() => {
        pipeDown.style.height = '80px'; // Reicht bis in den Erdschicht-Div
        storage.style.opacity = '1';
        flowDown.style.opacity = '1';
        flowDown.style.backgroundImage = 'linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.7) 50%, transparent 100%)';
      }, 300);

      infoTitle.textContent = 'Blauer Wasserstoff';
      infoTitle.style.color = 'var(--blue-glow)';
      infoText.innerHTML = 'Wird aus fossilem Erdgas hergestellt. Das entstehende CO₂ wird jedoch abgefangen und <strong>tief im Gestein gespeichert</strong> (CCS-Verfahren).';
      
      meterFill.style.width = '15%';
      meterFill.style.background = 'var(--blue-glow)';
      animateValue(meterValue, 15, 'ca. 1-2 kg');
    } 
    else if (type === 'gray') {
      document.getElementById('tab-gray').classList.add('active-gray');
      svgWind.style.display = 'none';
      svgGas.style.display = 'block';
      smoke.style.display = 'block';

      flowIn.style.backgroundImage = 'linear-gradient(90deg, transparent 0%, var(--gray-glow) 50%, transparent 100%)';
      coreGlow.style.opacity = '1';
      coreGlow.style.background = 'radial-gradient(circle, var(--gray-glow) 0%, transparent 70%)';

      infoTitle.textContent = 'Grauer Wasserstoff';
      infoTitle.style.color = 'var(--gray-glow)';
      infoText.innerHTML = 'Der derzeitige Standard der Industrie. Wird aus Erdgas gewonnen, aber das klimaschädliche <strong>CO₂ entweicht ungefiltert</strong> direkt in die Atmosphäre.';
      
      meterFill.style.width = '100%';
      meterFill.style.background = 'var(--gray-glow)';
      animateValue(meterValue, 100, 'ca. 10 kg');
    }
  }

  // Kleine Funktion, um die Zahl im Tacho hochzuzählen
  function animateValue(obj, end, suffix) {
    let startTimestamp = null;
    const duration = 800;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      const easeProgress = 1 - Math.pow(1 - progress, 3);
      obj.innerHTML = Math.floor(easeProgress * end) + '% <span style="font-size:12px;color:#94a3b8;display:block;margin-top:2px;">pro kg H₂: ' + suffix + ' CO₂</span>';
      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }
</script>

</body>
</html>
